url: https://kvenkita.github.io/spmixqr/

template:
  bootstrap: 5
  bslib:
    primary: "#1b5e57"

home:
  title: Spatial quantile regression with autocorrelation
  description: >
    Quantile regression for spatial data with a conditional-autoregressive (CAR)
    spatial-error term, weights from queen/rook contiguity, distance, or k-NN, and
    Moran's I diagnostics; extends to finite mixtures of spatial quantile regressions.

navbar:
  structure:
    left: [intro, primer, reference, news]
    right: [manual, search, github]
  components:
    primer:
      text: Primer
      href: articles/spmixqr-primer.html
    manual:
      text: Reference manual
      href: spmixqr-reference-manual.pdf

reference:
- title: Model fitting
  desc: Fit a spatial quantile regression (single-region or mixture) and configure the EM.
  contents:
  - spmixqr
  - spmixqr_control
  - spmixqr_select
- title: Spatial weights and autocorrelation (CAR / NNGP error)
  desc: >
    Build the weights matrix or an NNGP Matern precision (point data),
    diagnose residual spatial autocorrelation, and read the spatial effect.
  contents:
  - spq_weights
  - moran_resid
  - phi_surface
- title: Mixture surfaces and prediction
  contents:
  - spmixqr_basis
  - coef_surface
  - gate_surface
  - predict.spmixqr
  - plot.spmixqr
- title: Simulation and data
  contents:
  - sim_spmixqr
  - sim_spatial_confound
  - columbus_crime
  - columbus_W
  - lucas_house
  - nc_sids
  - nc_sids_W
  - meuse_zinc
- title: Package
  contents:
  - spmixqr-package

articles:
- title: Articles
  navbar: ~
  contents:
  - spmixqr
  - spmixqr-primer
  - articles/spmixqr-spatial-error
  - articles/spmixqr-mixtures
  - articles/spmixqr-validation
